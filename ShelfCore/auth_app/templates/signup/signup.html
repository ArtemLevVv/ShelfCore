{% extends 'base.html' %}
{% load static %}

{% block title %}
    SignUp
{% endblock title %}
    

{% block link %}
    <link rel="stylesheet" href="{% static 'signup/signup.html' %}">
{% endblock link %}
    

{% block content %}
    <div class="form">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">
                SIGN UP
            </button>
        </form>
    </div>
{% endblock content %}
