{% extends 'base.html' %}
{% load static %}


{% block title %}
    Product Category
{% endblock title %}


{% block link %}
    <link rel="stylesheet" href="{% static 'category/caa/category.css' %}">
{% endblock link %}


{% block content %}
    <a href="{% url 'product_category_create' %}">Create Category</a>
    <div class="menu">
        <div class="searc-tools">

        </div>
        <div class="category">
            
            {% for category in categories %}
                <div class="category">
                    <h2>{{ category.name }}</h2>
                </div>
                <button class="edit-button" data-id="{{ category.id }}" id="{{ category.id }}">
                    Edit
                </button>
            {% endfor %}
                
        </div>
        <div class="pages">

        </div>
    </div>

    <div class="modal">
        <div class="close">
            <button class="close-button">
                X
            </button>
        </div>
        <div class="inputs">
            <label for="">Name</label>
            <input type="text" id="edit-name">
            <label for="">Description</label>
            <input type="text" id="edit-description">
        </div>
    </div>

{% endblock content %}
