{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'css/base.css' %}">
        {% block link %}
            
        {% endblock link %}
        <title>
        {% block title %}
            
        {% endblock title %}
            </title>
    </head>
    <body>
        <header>
            {% if nav %}
                <nav>
                    <div class="links">
                        {% if user.is_authenticated %}
                            <a href="{% url 'signin' %}">signin</a>
                            <a href="{% url 'signup' %}">signup</a>
                        {% endif %}
                        <a href="">link</a>
                        <a href="">link</a>
                    </div>
                    <div class="log-out">
                        <form action="{% url 'signout' %}" method="post">
                            {% csrf_token %}
                            <button>
                                Logout
                            </button>
                        </form>
                    </div>
                </nav>
            {% endif %}
        </header>
        <main>
            {% block content %}
                
            {% endblock content %}
        </main>
        <footer>

        </footer>
    </body>
</html>
